<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board — 로그인</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <h1 class="auth-logo">Kanban Board</h1>

    <!-- 로그인 / 회원가입 탭 -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">로그인</button>
      <button class="auth-tab" data-tab="signup">회원가입</button>
    </div>

    <!-- 이메일 폼 -->
    <form id="auth-form" novalidate>
      <div class="form-group">
        <label for="auth-email">이메일</label>
        <input type="email" id="auth-email" placeholder="이메일 주소를 입력하세요" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="auth-password">비밀번호</label>
        <input type="password" id="auth-password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" required />
      </div>
      <p id="auth-error"   class="auth-error   hidden"></p>
      <p id="auth-success" class="auth-success hidden"></p>
      <button type="submit" id="auth-submit" class="btn-submit full">로그인</button>
    </form>

    <div class="auth-divider"><span>또는</span></div>

    <!-- 소셜 로그인 -->
    <button id="google-btn" class="btn-social btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.17z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.76-2.7.76-2.08 0-3.84-1.4-4.47-3.29H1.83v2.07A8 8 0 0 0 8.98 17z"/>
        <path fill="#FBBC05" d="M4.51 10.52A4.8 4.8 0 0 1 4.26 9c0-.52.09-1.02.25-1.52V5.41H1.83A8 8 0 0 0 .98 9c0 1.29.31 2.51.85 3.59l2.68-2.07z"/>
        <path fill="#EA4335" d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 8.98 1a8 8 0 0 0-7.15 4.41l2.68 2.07c.63-1.89 2.39-3.29 4.47-3.29z"/>
      </svg>
      Google로 계속하기
    </button>

    <button id="github-btn" class="btn-social btn-github">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.38-1.33-1.75-1.33-1.75-1.08-.74.08-.73.08-.73 1.2.09 1.83 1.23 1.83 1.23 1.07 1.83 2.8 1.3 3.49.99.1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.64 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      GitHub으로 계속하기
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    setupLoginRedirect();
    initLoginPage();
  </script>
</body>
</html>
